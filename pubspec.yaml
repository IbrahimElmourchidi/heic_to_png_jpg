name: heic_to_png_jpg
description: A Flutter package to convert HEIC images to JPG, PNG, or WebP on mobile, web, and desktop platforms.
version: 0.1.0
homepage: https://github.com/IbrahimElmourchidi/heic_to_png_jpg
repository: https://github.com/IbrahimElmourchidi/heic_to_png_jpg

topics:
  - image
  - heic
  - heif
  - converter

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.1
  image: ^4.0.15
  heif_converter: ^1.0.1
  path_provider: ^2.0.14
  plugin_platform_interface: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  test: ^1.24.0

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:
